name: Feature Request
description: Suggest an idea or enhancement for pwa2nx
title: '[Feature]: '
labels: ['enhancement', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting
        - 🔍 Search [existing feature requests](https://github.com/FaserF/pwa2nx/issues?q=label%3Aenhancement) to avoid duplicates
        - 📖 Check the [documentation](https://github.com/FaserF/pwa2nx/blob/main/README.md)

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Is your feature request related to a problem? Describe it clearly.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or code examples about the feature request here.
    validations:
      required: false
