name: Bug Report
description: Report a bug or issue with pwa2nx on your Nintendo Switch
title: '[BUG]: '
labels: ['bug', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting
        - 🔍 Search [existing issues](https://github.com/FaserF/pwa2nx/issues) to avoid duplicates
        - 📖 Check the [documentation](https://github.com/FaserF/pwa2nx/blob/main/README.md)

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Package app with PWA URL '...'
        2. Copy NRO to Switch '/switch/pwa2nx/'
        3. Launch the app and select user profile
        4. Observe behavior / crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: input
    id: fw_version
    attributes:
      label: Switch Firmware Version (OFW)
      description: Which official Nintendo Switch firmware version is running?
      placeholder: e.g. 17.0.0
    validations:
      required: true

  - type: input
    id: cfw_version
    attributes:
      label: Custom Firmware (CFW)
      description: Which CFW and version are you using?
      placeholder: e.g. Atmosphere 1.11.2
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App Version
      description: Which version of pwa2nx or the generated NRO are you running?
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: compiler_version
    attributes:
      label: devkitPro/libnx version (if building manually)
      description: Only fill this in if you compiled the wrapper yourself.
      placeholder: e.g. devkitA64 r20 / libnx v4.5.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Screen Captures or Console Logs
      description: Add any screenshots, video recordings, or console log dumps (e.g., Atmosphere crash dumps or console output) here.
    validations:
      required: false
