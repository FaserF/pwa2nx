name: Auto Reply & Governance

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    name: Post Greeting & Disclaimer
    runs-on: ubuntu-latest
    steps:
      - name: Auto-reply to Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `👋 Hello @${context.actor}! Thank you for opening this issue.

            > [!IMPORTANT]
            > **Disclaimer:** This project is an unofficial wrapper wrapper and is in no way affiliated, associated, authorized, endorsed by, or in any way officially connected with the creators or operators of the supported PWA platforms (e.g. Disney+, Telegram, Home Assistant, Spotify, SoundCloud, YouTube Music, etc.). All product names, logos, and brands are property of their respective owners.

            Our maintainers will review your request shortly. In the meantime, please make sure you have provided all environmental details (FW, CFW versions) and steps to reproduce the issue.`
            })

      - name: Auto-reply to Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `👋 Hello @${context.actor}! Thank you for submitting this pull request.

            > [!IMPORTANT]
            > **Disclaimer:** This project is an unofficial wrapper wrapper and is in no way affiliated, associated, authorized, endorsed by, or in any way officially connected with the creators or operators of the supported PWA platforms (e.g. Disney+, Telegram, Home Assistant, Spotify, SoundCloud, YouTube Music, etc.). All product names, logos, and brands are property of their respective owners.

            We appreciate your contribution! A maintainer will review your changes shortly. Please ensure your code conforms to the project linter guidelines and compiles cleanly on devkitPro.`
            })
