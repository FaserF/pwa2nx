name: CI Validation & Linting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-validate:
    name: Code Quality & Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linting & Test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff Pillow requests pytest

      - name: Check JSON Validity
        run: |
          for f in $(find . -name "*.json"); do
            echo "Checking JSON format for $f..."
            jq . "$f" > /dev/null
          done

      - name: Lint Python with Ruff
        run: ruff check scripts/ tests/

      - name: Check Python Code Formatting (Ruff)
        run: ruff format --check scripts/ tests/

      - name: Install Cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Static Code Analysis (Cppcheck)
        run: |
          cppcheck --error-exitcode=1 \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            source/

      - name: Run Python Unit Tests
        run: pytest tests/
